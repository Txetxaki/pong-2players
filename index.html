<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PONG — UNDERGROUND</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      user-select: none;
      overflow: hidden;
    }
    #ui {
      width: 800px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 10px;
      margin-bottom: 8px;
    }
    .player-label {
      font-size: 0.7rem;
      letter-spacing: 0.2rem;
      text-transform: uppercase;
    }
    #p1label { color: #0ff; text-shadow: 0 0 10px #0ff; }
    #p2label { color: #f0f; text-shadow: 0 0 10px #f0f; }
    #title {
      font-size: 1.2rem;
      letter-spacing: 0.6rem;
      color: #fff;
      text-shadow: 0 0 20px #fff, 0 0 40px rgba(255,255,255,0.3);
    }
    #wrap { position: relative; }
    canvas {
      display: block;
      border: 1px solid #111;
      box-shadow: 0 0 60px rgba(0,255,255,0.05), 0 0 120px rgba(255,0,255,0.03);
    }
    #overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      background: rgba(0,0,0,0.75);
    }
    #overlay h2 {
      font-family: 'Share Tech Mono', monospace;
      font-size: 3rem;
      letter-spacing: 0.4rem;
      color: #fff;
      text-shadow: 0 0 20px #0ff, 0 0 60px #0ff, 0 0 100px rgba(0,255,255,0.3);
    }
    #overlay p {
      font-family: 'Share Tech Mono', monospace;
      color: #555;
      font-size: 0.85rem;
      letter-spacing: 0.2rem;
      animation: blink 1.4s infinite;
    }
    #overlay .sub {
      font-size: 0.7rem;
      color: #333;
      letter-spacing: 0.15rem;
      animation: none;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.1} }
  </style>
</head>
<body>
<div id="ui">
  <span class="player-label" id="p1label">▶ J1: W/S</span>
  <span id="title">PONG</span>
  <span class="player-label" id="p2label">J2: ↑↓ ◀</span>
</div>
<div id="wrap">
  <canvas id="c" width="800" height="520"></canvas>
  <div id="overlay">
    <h2 id="oTitle">UNDERGROUND</h2>
    <p id="oMsg">[ SPACE ] para empezar</p>
    <span class="sub">primero en 7 puntos gana</span>
  </div>
</div>

<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const overlay = document.getElementById('overlay');
const oTitle = document.getElementById('oTitle');
const oMsg = document.getElementById('oMsg');
const W = c.width, H = c.height;

// Colors
const C1 = '#00ffff', C2 = '#ff00ff', CB = '#ffffff';
const PW = 10, PH = 88, PS = 7, WIN = 7;

let state = 'idle';
let flash = 0, screenShake = 0;

const ball = { x:W/2, y:H/2, vx:0, vy:0, r:8, trail:[] };
const p1 = { x:28, y:H/2-PH/2, score:0, hit:0 };
const p2 = { x:W-28-PW, y:H/2-PH/2, score:0, hit:0 };
const particles = [];
const sparks = [];

// BG grid points
const grid = [];
for(let x=0;x<=W;x+=40) for(let y=0;y<=H;y+=40) grid.push({x,y});

function spawnParticles(x, y, color, n=18) {
  for(let i=0;i<n;i++) {
    const a = Math.random()*Math.PI*2;
    const spd = 1 + Math.random()*5;
    particles.push({ x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd,
      life: 1, decay: 0.03+Math.random()*0.04, r: 2+Math.random()*3, color });
  }
}

function spawnSparks(x, y, color, n=8) {
  for(let i=0;i<n;i++) {
    const a = Math.random()*Math.PI*2;
    const spd = 3+Math.random()*8;
    sparks.push({ x, y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
      life:1, decay:0.06+Math.random()*0.06, color });
  }
}

function resetBall(dir) {
  ball.x=W/2; ball.y=H/2; ball.trail=[];
  const a=(Math.random()*50-25)*Math.PI/180;
  ball.vx=dir*5.5*Math.cos(a); ball.vy=5.5*Math.sin(a);
}

function startGame() {
  p1.score=p2.score=0; p1.y=p2.y=H/2-PH/2; p1.hit=p2.hit=0;
  particles.length=sparks.length=0;
  resetBall(Math.random()<.5?1:-1);
  state='playing'; overlay.style.display='none';
}

const keys={};
window.addEventListener('keydown', e=>{
  keys[e.key]=true;
  if([' ','ArrowUp','ArrowDown'].includes(e.key)) e.preventDefault();
  if(e.key===' '){
    if(state==='idle'||state==='won') startGame();
    else if(state==='playing'){ state='paused'; overlay.style.display='flex'; oTitle.textContent='PAUSA'; oMsg.textContent='[ SPACE ] para continuar'; oTitle.style.textShadow='0 0 20px #f0f, 0 0 60px #f0f'; }
    else if(state==='paused'){ state='playing'; overlay.style.display='none'; }
  }
});
window.addEventListener('keyup', e=>keys[e.key]=false);

function update() {
  if(state!=='playing') return;

  // Paddles
  if(keys['w']||keys['W']) p1.y-=PS;
  if(keys['s']||keys['S']) p1.y+=PS;
  if(keys['ArrowUp'])   p2.y-=PS;
  if(keys['ArrowDown']) p2.y+=PS;
  p1.y=Math.max(0,Math.min(H-PH,p1.y));
  p2.y=Math.max(0,Math.min(H-PH,p2.y));

  if(p1.hit>0) p1.hit--;
  if(p2.hit>0) p2.hit--;

  // Ball trail
  ball.trail.push({x:ball.x,y:ball.y});
  if(ball.trail.length>18) ball.trail.shift();

  ball.x+=ball.vx; ball.y+=ball.vy;

  // Wall bounce
  if(ball.y-ball.r<0){ ball.y=ball.r; ball.vy*=-1; spawnSparks(ball.x,0,CB,5); screenShake=4; }
  if(ball.y+ball.r>H){ ball.y=H-ball.r; ball.vy*=-1; spawnSparks(ball.x,H,CB,5); screenShake=4; }

  const hit = p => ball.x-ball.r<p.x+PW && ball.x+ball.r>p.x && ball.y>p.y && ball.y<p.y+PH;

  if(ball.vx<0&&hit(p1)){
    const h=(ball.y-(p1.y+PH/2))/(PH/2);
    const spd=Math.min(Math.hypot(ball.vx,ball.vy)*1.06,16);
    const a=h*65*Math.PI/180;
    ball.vx=spd*Math.cos(a); ball.vy=spd*Math.sin(a); ball.x=p1.x+PW+ball.r;
    p1.hit=8; screenShake=6; flash=6;
    spawnParticles(ball.x,ball.y,C1,22);
    spawnSparks(ball.x,ball.y,C1,10);
  }
  if(ball.vx>0&&hit(p2)){
    const h=(ball.y-(p2.y+PH/2))/(PH/2);
    const spd=Math.min(Math.hypot(ball.vx,ball.vy)*1.06,16);
    const a=h*65*Math.PI/180;
    ball.vx=-(spd*Math.cos(a)); ball.vy=spd*Math.sin(a); ball.x=p2.x-ball.r;
    p2.hit=8; screenShake=6; flash=6;
    spawnParticles(ball.x,ball.y,C2,22);
    spawnSparks(ball.x,ball.y,C2,10);
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vx*=0.92; p.vy*=0.92; p.life-=p.decay;
    if(p.life<=0) particles.splice(i,1);
  }
  for(let i=sparks.length-1;i>=0;i--){
    const s=sparks[i];
    s.x+=s.vx; s.y+=s.vy; s.vy+=0.15; s.life-=s.decay;
    if(s.life<=0) sparks.splice(i,1);
  }

  if(screenShake>0) screenShake--;
  if(flash>0) flash--;

  if(ball.x<0){ spawnParticles(0,ball.y,C2,30); p2.score++; doScore(); }
  if(ball.x>W){ spawnParticles(W,ball.y,C1,30); p1.score++; doScore(); }
}

function doScore(){
  screenShake=12; flash=12;
  if(!checkWin()) setTimeout(()=>resetBall(p1.score>p2.score?-1:1),700);
}

function checkWin(){
  if(p1.score>=WIN||p2.score>=WIN){
    state='won'; overlay.style.display='flex';
    const winner = p1.score>=WIN ? 'JUGADOR 1' : 'JUGADOR 2';
    const col = p1.score>=WIN ? C1 : C2;
    oTitle.textContent=winner+' GANA';
    oTitle.style.textShadow=`0 0 20px ${col}, 0 0 60px ${col}, 0 0 120px ${col}`;
    oMsg.textContent='[ SPACE ] para revanche'; return true;
  }
}

function drawGrid(){
  ctx.save();
  for(const pt of grid){
    const dx=ball.x-pt.x, dy=ball.y-pt.y;
    const dist=Math.hypot(dx,dy);
    const influence=Math.max(0,1-dist/160);
    if(influence<0.02) continue;
    const a=influence*0.6;
    ctx.globalAlpha=a;
    ctx.fillStyle='#0ff';
    ctx.fillRect(pt.x-0.5,pt.y-0.5,1,1);
  }
  ctx.restore();
}

function drawTrail(){
  for(let i=0;i<ball.trail.length;i++){
    const t=ball.trail[i];
    const alpha=(i/ball.trail.length)*0.5;
    const r=ball.r*(i/ball.trail.length)*0.8;
    const speed=Math.hypot(ball.vx,ball.vy);
    const hue=200+speed*8;
    ctx.globalAlpha=alpha;
    ctx.shadowBlur=10;
    ctx.shadowColor=`hsl(${hue},100%,70%)`;
    ctx.fillStyle=`hsl(${hue},100%,70%)`;
    ctx.beginPath();
    ctx.arc(t.x,t.y,Math.max(r,1),0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1; ctx.shadowBlur=0;
}

function drawScore(){
  ctx.textAlign='center';
  // P1 score
  ctx.font='bold 72px Share Tech Mono, Courier New';
  ctx.shadowBlur=30; ctx.shadowColor=C1;
  ctx.fillStyle=C1;
  ctx.globalAlpha=0.9;
  ctx.fillText(p1.score, W/2-110, 80);
  // P2 score
  ctx.shadowColor=C2; ctx.fillStyle=C2;
  ctx.fillText(p2.score, W/2+110, 80);
  ctx.globalAlpha=1; ctx.shadowBlur=0;
}

function drawPaddle(p, color){
  const glow = p.hit>0 ? 30 : 12;
  ctx.shadowBlur=glow; ctx.shadowColor=color; ctx.fillStyle=color;
  // main body
  rr(p.x,p.y,PW,PH,4);
  // inner shine
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,0.15)';
  rr(p.x+2,p.y+4,PW-4,PH-8,3);
}

function rr(x,y,w,h,r=4){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath(); ctx.fill();
}

function drawBall(){
  const speed=Math.hypot(ball.vx,ball.vy);
  const hue=200+speed*9;
  // outer glow
  ctx.shadowBlur=40; ctx.shadowColor=`hsl(${hue},100%,70%)`;
  ctx.fillStyle=`hsl(${hue},100%,80%)`;
  ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2); ctx.fill();
  // core
  ctx.shadowBlur=10;
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.r*0.4,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
}

function drawParticles(){
  for(const p of particles){
    ctx.globalAlpha=p.life;
    ctx.shadowBlur=8; ctx.shadowColor=p.color; ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill();
  }
  for(const s of sparks){
    ctx.globalAlpha=s.life;
    ctx.strokeStyle=s.color; ctx.shadowColor=s.color; ctx.shadowBlur=6; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(s.x,s.y); ctx.lineTo(s.x-s.vx*3,s.y-s.vy*3); ctx.stroke();
  }
  ctx.globalAlpha=1; ctx.shadowBlur=0;
}

function drawCenterLine(){
  ctx.save();
  for(let y=10;y<H;y+=22){
    const proximity=Math.abs(ball.y-y);
    const glow=Math.max(0,1-proximity/80);
    ctx.globalAlpha=0.08+glow*0.25;
    ctx.shadowBlur=glow*15; ctx.shadowColor='#0ff';
    ctx.fillStyle=glow>0.1?'#0ff':'#333';
    ctx.fillRect(W/2-1,y,2,10);
  }
  ctx.restore();
}

function drawFlash(){
  if(flash>0){
    ctx.globalAlpha=flash/12*0.18;
    ctx.fillStyle='#fff';
    ctx.fillRect(0,0,W,H);
    ctx.globalAlpha=1;
  }
}

// Scanline CRT effect
function drawScanlines(){
  ctx.save();
  ctx.globalAlpha=0.025;
  ctx.fillStyle='#000';
  for(let y=0;y<H;y+=2) ctx.fillRect(0,y,W,1);
  ctx.restore();
}

function draw(){
  const sx=(Math.random()-0.5)*screenShake;
  const sy=(Math.random()-0.5)*screenShake;
  ctx.save();
  if(screenShake>0) ctx.translate(sx,sy);

  // Background
  ctx.fillStyle='#000';
  ctx.fillRect(-10,-10,W+20,H+20);

  drawGrid();
  drawCenterLine();
  drawScore();
  drawTrail();
  drawParticles();
  drawPaddle(p1,C1);
  drawPaddle(p2,C2);
  drawBall();
  drawFlash();
  drawScanlines();
  ctx.restore();
}

(function loop(){ update(); draw(); requestAnimationFrame(loop); })();
</script>
</body>
</html>
